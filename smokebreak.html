function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let W = () => canvas.width;
let H = () => canvas.height;

let running = false;
let score = 0;
let haze = 0; // 0-100, only ever increases
let puffInterval = 5000;
let nextPuffAt = 0;
let smokePuffs = [];
let rings = [];
let pointer = {x: 0, y: 0, active:false};
let animId = null;
let ringId = 0;

function rand(a,b){ return a + Math.random()*(b-a); }
function pickSmokeImg(){ return smokeImgs[Math.floor(Math.random()*smokeImgs.length)]; }

class SmokePuff {
  constructor(){
    const rect = pilotEl.getBoundingClientRect();
    this.x = rect.left + rect.width*0.30;
    this.y = rect.top + rect.height*0.28;
    this.r = rand(30,42);
    this.driftX = rand(-0.3,0.3);
    this.driftY = rand(-0.6,-0.2);
    this.wobble = Math.random()*Math.PI*2;
    this.rot = rand(0,Math.PI*2);
    this.rotSpeed = rand(-0.0006,0.0006);
    this.grabbed = false;
    this.dead = false;
    this.trail = [];
    this.img = pickSmokeImg();
  }
  update(dt){
    this.wobble += dt*0.002;
    this.rot += this.rotSpeed*dt;
    if(this.grabbed){
      this.x += (pointer.x - this.x) * Math.min(1, dt*0.008);
      this.y += (pointer.y - this.y) * Math.min(1, dt*0.008);
    } else {
      this.x += this.driftX*dt*0.06 + Math.sin(this.wobble)*0.3;
      this.y += this.driftY*dt*0.06;
    }
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    if(this.y < -60 && !this.grabbed){
      this.dead = true;
      addHaze(3);
    }
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const t = this.trail[i];
      const a = (i/this.trail.length)*0.28;
      const s = this.r*1.5*0.6;
      ctx.save();
      ctx.globalAlpha = a;
      if(this.img.complete && this.img.naturalWidth){
        ctx.drawImage(this.img, t.x-s/2, t.y-s/2, s, s);
      }
      ctx.restore();
    }
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot);
    const s = this.r*3;
    if(this.img.complete && this.img.naturalWidth){
      ctx.globalAlpha = 0.95;
      ctx.drawImage(this.img, -s/2, -s/2, s, s);
    } else {
      const grad = ctx.createRadialGradient(0,0,2,0,0,this.r);
      grad.addColorStop(0,'rgba(255,255,255,0.95)');
      grad.addColorStop(1,'rgba(230,230,235,0)');
      ctx.beginPath();
      ctx.arc(0,0,this.r,0,Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    }
    ctx.restore();
  }
}

class Ring {
  constructor(){
    this.id = ringId++;
    const margin = 90;
    this.x = rand(margin, W()-margin);
    this.y = rand(margin, H()*0.7);
    this.r = 34;
    this.maxLife = rand(2600,3800);
    this.life = this.maxLife;
    this.hue = rand(180,320);
    this.hit = false;
  }
  update(dt){
    this.life -= dt;
  }
  get progress(){ return Math.max(0,this.life/this.maxLife); }
  draw(){
    const p = this.progress;
    const pulse = 1 + Math.sin(performance.now()*0.006 + this.id)*0.05;
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.5*p;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r*pulse,0,Math.PI*2);
    ctx.lineWidth = 5;
    ctx.strokeStyle = `hsl(${this.hue},90%,65%)`;
    ctx.shadowColor = `hsl(${this.hue},90%,60%)`;
    ctx.shadowBlur = 18;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r*0.55,0,Math.PI*2*p);
    ctx.lineWidth=3;
    ctx.strokeStyle = `hsla(${this.hue},90%,80%,0.8)`;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.restore();
  }
}

function updateFogLayer(){
  // fog layer fades in starting around 20% haze, grows with haze level
  if(haze >= 20){
    const t = Math.min(1, (haze-20)/70); // 0 at 20%, 1 at 90%+
    fogLayer.style.opacity = Math.min(1, 0.15 + t*0.9);
    fogLayer.style.height = (18 + t*42) + 'vh';
  } else {
    fogLayer.style.opacity = 0;
    fogLayer.style.height = '0vh';
  }
}

function addHaze(amount){
  // haze only ever increases, never decreases
  if(amount <= 0) return;
  haze = Math.min(100, haze + amount);
  hazeEl.textContent = Math.floor(haze) + '%';
  smokeFill.style.height = haze + '%';
  vignette.style.boxShadow = `inset 0 0 ${140 - haze}px ${40+haze*2}px rgba(255,255,255,${Math.min(0.85,haze/110)})`;
  canvas.style.filter = `blur(${haze*0.06}px)`;
  updateFogLayer();
  if(haze >= 100){
    endGame();
  }
}

function spawnPuff(){
  smokePuffs.push(new SmokePuff());
  addHaze(2.2);
  pilotEl.src = PILOT_BLOW;
  clearTimeout(pilotEl._t);
  pilotEl._t = setTimeout(()=>{ if(running) pilotEl.src = PILOT_IDLE; }, 900);
}

function maybeSpawnRing(){
  if(!running) return;
  if(rings.length < 3 && Math.random() < 0.02){
    rings.push(new Ring());
  }
}

let floats = [];
function spawnScoreFloat(x,y,text){
  floats.push({x,y,text,life:1000});
}
function drawFloats(dt){
  ctx.save();
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'center';
  for(const f of floats){
    f.life -= dt;
    const p = 1 - f.life/1000;
    ctx.globalAlpha = Math.max(0,1-p);
    ctx.fillStyle = '#fff2b0';
    ctx.shadowColor='rgba(0,0,0,0.7)';
    ctx.shadowBlur=4;
    ctx.fillText(f.text, f.x, f.y - p*40);
  }
  ctx.restore();
  floats = floats.filter(f=>f.life>0);
}

function checkRingCollisions(){
  for(const puff of smokePuffs){
    if(puff.dead || !puff.grabbed) continue;
    for(const ring of rings){
      if(ring.hit) continue;
      const dx = puff.x-ring.x, dy=puff.y-ring.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < ring.r*0.6){
        ring.hit = true;
        const speedBonus = Math.max(10, Math.floor(100 * ring.progress));
        score += speedBonus;
        scoreEl.textContent = score;
        spawnScoreFloat(ring.x, ring.y, '+'+speedBonus);
        // haze never decreases, even on a successful catch
        puff.dead = true;
      }
    }
  }
  rings = rings.filter(r => !r.hit && r.life > 0);
  smokePuffs = smokePuffs.filter(p => !p.dead);
}

function drawAmbientHaze(dt){
  const count = Math.floor(haze/6);
  for(let i=0;i<count;i++){
    const seed = i*137.5;
    const x = (Math.sin(seed + performance.now()*0.0002)*0.5+0.5) * W();
    const y = H() - (performance.now()*0.02 + seed*3) % (H()*0.9);
    const r = 60 + (i%5)*20;
    const grad = ctx.createRadialGradient(x,y,0,x,y,r);
    grad.addColorStop(0,`rgba(230,225,232,${0.05+haze/500})`);
    grad.addColorStop(1,'rgba(230,225,232,0)');
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

let lastTime = performance.now();
function loop(now){
  if(!running) return;
  const dt = now - lastTime;
  lastTime = now;
  ctx.clearRect(0,0,W(),H());

  drawAmbientHaze(dt);

  if(now >= nextPuffAt){
    spawnPuff();
    nextPuffAt = now + puffInterval;
  }

  maybeSpawnRing();

  for(const r of rings){ r.update(dt); r.draw(); }
  for(const p of smokePuffs){ p.update(dt); p.draw(); }

  checkRingCollisions();
  drawFloats(dt);

  addHaze(dt*0.0006);

  animId = requestAnimationFrame(loop);
}

function pointerPos(e){
  if(e.touches && e.touches.length){
    return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }
  return {x:e.clientX, y:e.clientY};
}

function onPointerDown(e){
  const p = pointerPos(e);
  pointer.x = p.x; pointer.y = p.y; pointer.active = true;
  let nearest = null, nd = 9999;
  for(const puff of smokePuffs){
    const dx = puff.x-p.x, dy=puff.y-p.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d < 90 && d < nd){ nd = d; nearest = puff; }
  }
  if(nearest) nearest.grabbed = true;
  else if(smokePuffs.length){
    smokePuffs[smokePuffs.length-1].grabbed = true;
  }
}
function onPointerMove(e){
  const p = pointerPos(e);
  pointer.x = p.x; pointer.y = p.y;
}
function onPointerUp(){
  pointer.active = false;
  for(const puff of smokePuffs) puff.grabbed = false;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, {passive:true});
canvas.addEventListener('touchmove', onPointerMove, {passive:true});
canvas.addEventListener('touchend', onPointerUp, {passive:true});

function endGame(){
  running = false;
  cancelAnimationFrame(animId);
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>&#128248; TOTAL WHITEOUT</h1>
    <div class="score">${score}</div>
    <p>The break room is completely fogged. Bay_07 is calling you back.</p>
    <button id="startBtn2">RUN IT BACK</button>
  `;
  document.getElementById('startBtn2').addEventListener('click', startGame);
}

function startGame(){
  score = 0; haze = 0; rings = []; smokePuffs = []; floats = [];
  scoreEl.textContent = 0; hazeEl.textContent = '0%';
  smokeFill.style.height = '0%';
  vignette.style.boxShadow = 'inset 0 0 140px 40px rgba(255,255,255,0)';
  canvas.style.filter = 'blur(0px)';
  fogLayer.style.opacity = 0;
  fogLayer.style.height = '0vh';
  pilotEl.src = PILOT_IDLE;
  overlay.style.display = 'none';
  running = true;
  lastTime = performance.now();
  nextPuffAt = performance.now() + 800;
  animId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
