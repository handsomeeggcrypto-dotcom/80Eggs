<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80EGGS — COCKPIT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* Container always matches image's 3:2 aspect ratio, fits inside viewport */
#cockpit{
  position:relative;
  /* fill width up to 3:2 constraint, never taller than 100vh */
  width:min(100vw, calc(100vh * 3 / 2));
  height:min(100vh, calc(100vw * 2 / 3));
  flex-shrink:0;
}

/* Video background fills the window area */
#bg-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
  pointer-events:none;
}

/* Cockpit frame sits on top — transparent window areas let the video show through */
#cockpit-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  user-select:none;
  pointer-events:none;
  z-index:1;
}

/* Pulsing neon glow animations — each hotspot has its own color theme */
@keyframes pulse-cyan{
  0%,100%{box-shadow:0 0 0 2px rgba(45,226,230,0.5), 0 0 18px 4px rgba(45,226,230,0.25), inset 0 0 12px rgba(45,226,230,0.06);}
  50%{box-shadow:0 0 0 2px rgba(45,226,230,0.9), 0 0 40px 12px rgba(45,226,230,0.45), inset 0 0 24px rgba(45,226,230,0.12);}
}
@keyframes pulse-orange{
  0%,100%{box-shadow:0 0 0 2px rgba(255,154,60,0.5), 0 0 18px 4px rgba(255,154,60,0.25), inset 0 0 12px rgba(255,154,60,0.06);}
  50%{box-shadow:0 0 0 2px rgba(255,154,60,0.9), 0 0 40px 12px rgba(255,154,60,0.45), inset 0 0 24px rgba(255,154,60,0.12);}
}
@keyframes pulse-green{
  0%,100%{box-shadow:0 0 0 2px rgba(125,255,164,0.5), 0 0 18px 4px rgba(125,255,164,0.25), inset 0 0 12px rgba(125,255,164,0.06);}
  50%{box-shadow:0 0 0 2px rgba(125,255,164,0.9), 0 0 40px 12px rgba(125,255,164,0.45), inset 0 0 24px rgba(125,255,164,0.12);}
}
@keyframes pulse-purple{
  0%,100%{box-shadow:0 0 0 2px rgba(200,120,255,0.5), 0 0 18px 4px rgba(200,120,255,0.25), inset 0 0 12px rgba(200,120,255,0.06);}
  50%{box-shadow:0 0 0 2px rgba(200,120,255,0.9), 0 0 40px 12px rgba(200,120,255,0.45), inset 0 0 24px rgba(200,120,255,0.12);}
}
@keyframes label-pulse{
  0%,100%{opacity:.7;}
  50%{opacity:1;}
}

/* Clickable screen hotspots — % of the #cockpit container */
.hotspot{
  position:absolute;
  cursor:pointer;
  text-decoration:none;
  border-radius:6px;
  z-index:2;
}

/* Each hotspot gets its own neon color */
#hs-eggdefend{ animation:pulse-green 2.4s ease-in-out infinite; }
#hs-crypto{    animation:pulse-cyan  2.8s ease-in-out infinite; }
#hs-typing{    animation:pulse-orange 2.2s ease-in-out infinite; }
#hs-sudoku{    animation:pulse-purple 3.0s ease-in-out infinite; }

.hotspot:hover{
  animation:none;
  box-shadow:0 0 0 3px rgba(255,255,255,0.7),
             0 0 50px 16px rgba(255,255,255,0.25),
             inset 0 0 30px rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.06);
}

/* Label — always visible, pulses gently */
.hotspot .label{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  font-family:'Courier New',monospace;
  font-size:clamp(8px,1vw,13px);
  letter-spacing:2px;
  white-space:nowrap;
  pointer-events:none;
  animation:label-pulse 2.2s ease-in-out infinite;
}
#hs-eggdefend .label{ color:#7dffa4; text-shadow:0 0 6px #7dffa4, 0 0 16px #7dffa4; }
#hs-crypto    .label{ color:#2de2e6; text-shadow:0 0 6px #2de2e6, 0 0 16px #2de2e6; }
#hs-typing    .label{ color:#ff9a3c; text-shadow:0 0 6px #ff9a3c, 0 0 16px #ff9a3c; }
#hs-sudoku    .label{ color:#c87fff; text-shadow:0 0 6px #c87fff, 0 0 16px #c87fff; }
#hs-smoke     .label{ color:#ff80d0; text-shadow:0 0 6px #ff80d0, 0 0 16px #ff80d0; bottom:auto; top:105%; }

/* ---- Screen hotspot positions (% of 1536×1024 image) ----
   Top-left (SYSTEM STATUS / egg defend): ~cols 0–280, rows 0–265
   Left  (SYSTEM MONITOR / crypto):       ~cols 55–420, rows 555–875
   Center (TYPING GAME):                  ~cols 460–1075, rows 505–865
   Right  (SUDOKU):                       ~cols 1115–1490, rows 555–875
*/
#hs-eggdefend{
  left:0.5%;   top:0.5%;
  width:16%;   height:23%;
}
#hs-crypto{
  left:5%;     top:56%;
  width:20%;   height:26%;
}
#hs-typing{
  left:31.5%;  top:51%;
  width:37%;   height:31%;
}
#hs-sudoku{
  left:73%;    top:56%;
  width:21%;   height:26%;
}

/* Heart sticker — top right, outside the cockpit panel area */
#hs-smoke{
  right:0%;    top:0%;
  width:14%;   height:20%;
  border-radius:50%;
  overflow:hidden;
}
#hs-smoke img{
  width:100%; height:100%;
  object-fit:cover;
  pointer-events:none;
  user-select:none;
  display:block;
  transition:transform .2s, filter .2s;
}
#hs-smoke:hover img{
  transform:scale(1.08);
  filter:drop-shadow(0 0 12px rgba(255,120,200,0.8)) drop-shadow(0 0 30px rgba(255,80,180,0.5));
}
#hs-smoke .label{ bottom:auto; top:105%; }

/* Secret hotspot — hidden until "67" is typed */
#hs-secret{
  left:36%;    top:1%;
  width:28%;   height:10%;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s;
  border-radius:6px;
  z-index:2;
}
#hs-secret.revealed{
  opacity:1;
  pointer-events:auto;
  animation:pulse-secret 1.5s ease-in-out infinite;
}
@keyframes pulse-secret{
  0%,100%{box-shadow:0 0 0 2px rgba(255,230,50,0.6), 0 0 20px 6px rgba(255,200,0,0.3);}
  50%{box-shadow:0 0 0 2px rgba(255,230,50,1), 0 0 45px 14px rgba(255,200,0,0.6);}
}
#hs-secret .label{ color:#ffe032; text-shadow:0 0 6px #ffe032, 0 0 18px #ffe032; }
</style>
</head>
<body>
<div id="cockpit">
  <video id="bg-video" autoplay loop muted playsinline>
    <source src="bg.MOV" type="video/mp4">
  </video>
  <img id="cockpit-img" src="cockpit4.png" alt="80Eggs Cockpit" draggable="false">

  <a class="hotspot" id="hs-eggdefend" href="eggdefend.html">
    <span class="label">EGG DEFEND</span>
  </a>
  <a class="hotspot" id="hs-crypto" href="crypto.html">
    <span class="label">EGG CONTROL PANEL</span>
  </a>
  <a class="hotspot" id="hs-typing" href="typing.html">
    <span class="label">TYPING TERMINAL</span>
  </a>
  <a class="hotspot" id="hs-sudoku" href="sudoku.html">
    <span class="label">SUDOKU 数独</span>
  </a>
  <a class="hotspot" id="hs-smoke" href="smokebreak.html">
    <img src="heart.JPG" alt="Smoke Ring Break">
    <span class="label">SMOKE BREAK</span>
  </a>
  <a class="hotspot" id="hs-secret" href="moe_fights.html">
    <span class="label">??? CLASSIFIED ???</span>
  </a>
</div>
<script>
(function(){
  let seq = '';
  document.addEventListener('keydown', function(e){
    seq += e.key;
    if(seq.length > 2) seq = seq.slice(-2);
    if(seq === '67'){
      const el = document.getElementById('hs-secret');
      el.classList.add('revealed');
      // flash the label text briefly
      seq = '';
    }
  });
})();
</script>
</body>
</html>
