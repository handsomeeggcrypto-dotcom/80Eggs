<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80EGGS — COCKPIT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* Container always matches image's 3:2 aspect ratio, fits inside viewport */
#cockpit{
  position:relative;
  /* fill width up to 3:2 constraint, never taller than 100vh */
  width:min(100vw, calc(100vh * 3 / 2));
  height:min(100vh, calc(100vw * 2 / 3));
  flex-shrink:0;
}

#cockpit img{
  width:100%;
  height:100%;
  display:block;
  user-select:none;
  pointer-events:none;
  draggable:false;
}

/* Clickable screen hotspots — % of the #cockpit container */
.hotspot{
  position:absolute;
  cursor:pointer;
  text-decoration:none;
  border-radius:6px;
  transition:box-shadow .2s, background .2s;
}
.hotspot:hover{
  box-shadow:0 0 0 3px rgba(255,255,255,0.45),
             0 0 35px 8px rgba(180,120,255,0.5);
  background:rgba(180,120,255,0.07);
}

/* Label revealed on hover */
.hotspot .label{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  font-family:'Courier New',monospace;
  font-size:clamp(9px,1.1vw,14px);
  letter-spacing:2px;
  color:#fff;
  text-shadow:0 0 8px #c97fff, 0 0 20px #c97fff;
  white-space:nowrap;
  opacity:0;
  transition:opacity .2s;
  pointer-events:none;
}
.hotspot:hover .label{ opacity:1; }

/* ---- Screen hotspot positions (% of 1536×1024 image) ----
   Top-left (SYSTEM STATUS / egg defend): ~cols 0–280, rows 0–265
   Left  (SYSTEM MONITOR / crypto):       ~cols 55–420, rows 555–875
   Center (TYPING GAME):                  ~cols 460–1075, rows 505–865
   Right  (SUDOKU):                       ~cols 1115–1490, rows 555–875
*/
#hs-eggdefend{
  left:0%;     top:0%;
  width:18.5%; height:26%;
}
#hs-crypto{
  left:3.6%;   top:54.2%;
  width:23.7%; height:31.3%;
}
#hs-typing{
  left:30%;    top:49.3%;
  width:41%;   height:35%;
}
#hs-sudoku{
  left:72.7%;  top:54.2%;
  width:24.5%; height:31.3%;
}

/* Heart sticker — top right, outside the cockpit panel area */
#hs-smoke{
  right:0%;    top:0%;
  width:14%;   height:20%;
  border-radius:50%;
  overflow:hidden;
}
#hs-smoke img{
  width:100%; height:100%;
  object-fit:cover;
  pointer-events:none;
  user-select:none;
  display:block;
  transition:transform .2s, filter .2s;
}
#hs-smoke:hover img{
  transform:scale(1.08);
  filter:drop-shadow(0 0 12px rgba(255,120,200,0.8)) drop-shadow(0 0 30px rgba(255,80,180,0.5));
}
#hs-smoke .label{ bottom:auto; top:105%; }
</style>
</head>
<body>
<div id="cockpit">
  <img src="cockpit.png" alt="80Eggs Cockpit" draggable="false">

  <a class="hotspot" id="hs-eggdefend" href="eggdefend.html">
    <span class="label">EGG DEFEND</span>
  </a>
  <a class="hotspot" id="hs-crypto" href="crypto.html">
    <span class="label">EGG CONTROL PANEL</span>
  </a>
  <a class="hotspot" id="hs-typing" href="typing.html">
    <span class="label">TYPING TERMINAL</span>
  </a>
  <a class="hotspot" id="hs-sudoku" href="sudoku.html">
    <span class="label">SUDOKU 数独</span>
  </a>
  <a class="hotspot" id="hs-smoke" href="smokebreak.html">
    <img src="heart.jpg" alt="Smoke Ring Break">
    <span class="label">SMOKE BREAK</span>
  </a>
</div>
</body>
</html>
